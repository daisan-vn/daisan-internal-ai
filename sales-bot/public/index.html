<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tư vấn Daisan</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="sb-layout">
      <!-- Cột trái: hội thoại -->
      <section class="sb-app">
        <header class="sb-header">
          <span class="sb-logo">🛒</span>
          <div>
            <strong>Tư vấn Daisan</strong>
            <small>VLXD · báo giá nhanh toàn quốc</small>
          </div>
        </header>
        <main class="sb-messages" id="messages"></main>
        <form class="sb-composer" id="form">
          <input id="input" type="text" autocomplete="off" placeholder="Bạn cần vật liệu gì? (vd: gạch 60x60…)" />
          <button id="send" type="submit" aria-label="Gửi">➤</button>
        </form>
      </section>

      <!-- Cột phải: kết quả sản phẩm (ẩn trên màn hẹp / widget) -->
      <aside class="sb-products" id="productsPanel">
        <div class="sb-products-head">
          <span>🛍️ Sản phẩm gợi ý</span>
          <div class="sb-view-toggle">
            <button type="button" id="viewGrid" class="active" title="Dạng lưới" aria-label="Lưới">⊞</button>
            <button type="button" id="viewList" title="Dạng danh sách" aria-label="Danh sách">☰</button>
          </div>
        </div>
        <div class="sb-products-bar" id="productsBar" hidden>
          <select id="filterCat"><option value="">Tất cả ngành hàng</option></select>
          <select id="filterSort">
            <option value="">Sắp xếp: Liên quan</option>
            <option value="asc">Giá: thấp → cao</option>
            <option value="desc">Giá: cao → thấp</option>
          </select>
          <span class="sb-count" id="productsCount"></span>
        </div>
        <div class="sb-products-grid" id="products">
          <div class="sb-products-empty">Hỏi em về sản phẩm — kết quả sẽ hiện ở đây 👈</div>
        </div>
      </aside>
    </div>
    <script src="/chat.js"></script>
  </body>
</html>
