<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trợ lý AI nội bộ — Daisan Group</title>
    <link rel="icon" href="/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Áp dụng nền Sáng/Tối đã lưu ngay lập tức (tránh nhấp nháy). Mặc định: tối.
      (function () { try { if (localStorage.getItem("theme") === "light") document.documentElement.setAttribute("data-theme", "light"); } catch (e) {} })();
    </script>
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="side-top">
          <div class="brand">
            <img src="/logo.png" alt="Daisan Group" class="brand-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
            <span class="brand-fallback" style="display:none; align-items:center; gap:10px">
              <span class="brand-logo">✦</span><span class="brand-name">Trợ lý Daisan</span>
            </span>
          </div>
          <button class="new-chat" id="newChat">
            <span>＋</span> Trò chuyện mới
          </button>
        </div>

        <div class="conv-section">
          <div class="conv-head">Lịch sử trò chuyện</div>
          <div class="conv-list" id="convList"></div>
        </div>

        <div class="side-foot">
          <label class="field field-compact">
            <span class="field-label">Phòng ban</span>
            <select id="domain">
              <option value="">Tất cả</option>
              <option value="odoo">Odoo</option>
              <option value="ketoan">Kế toán</option>
              <option value="sop">SOP / Quy trình</option>
              <option value="crm">CRM / Kinh doanh</option>
              <option value="mua">Mua hàng</option>
              <option value="kho">Kho</option>
            </select>
          </label>
          <a class="admin-link" href="/admin">🔧 Quản trị tài liệu</a>
          <div class="org">
            <span class="org-logo">🟦</span>
            <div class="org-text">
              <strong>Daisan Group</strong>
              <small id="userEmail">🔒 Nội bộ</small>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <header class="topbar">
          <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>
          <div class="topbar-title">
            <span>Trợ lý AI nội bộ</span>
            <small>Claude Sonnet 4.6</small>
          </div>
          <button class="theme-toggle" id="themeToggle" type="button" title="Đổi nền Sáng/Tối" aria-label="Đổi nền">🌙</button>
          <span class="topbar-badge">🔒 Chỉ nội bộ</span>
        </header>

        <div class="chat" id="messages"></div>

        <div class="composer-wrap">
          <form id="form" class="composer">
            <textarea
              id="input"
              rows="1"
              placeholder="Hỏi về Odoo, kế toán, SOP, kho… (Enter để gửi)"
              autocomplete="off"
            ></textarea>
            <button id="send" type="submit" class="send-btn" aria-label="Gửi">↑</button>
          </form>
          <p class="disclaimer">
            Trợ lý chỉ trả lời dựa trên tài liệu nội bộ Daisan và luôn ghi rõ nguồn.
          </p>
        </div>
      </div>
    </div>

    <div class="backdrop" id="backdrop"></div>
    <script src="/chat.js"></script>
  </body>
</html>
