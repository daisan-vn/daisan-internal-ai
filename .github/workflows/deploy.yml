name: Deploy to Cloudflare Workers

# Deploy troly.daisan.ai (production) CHỈ khi có thay đổi trên nhánh `main`.
# Quy trình: phát triển ở nhánh khác -> merge vào `main` -> tự động deploy.
# -> Production luôn ổn định; code đang làm dở trên nhánh dev không ảnh hưởng web thật.
#
# Cần 1 secret trong GitHub (Settings > Secrets and variables > Actions):
#   - CLOUDFLARE_API_TOKEN: token Cloudflare quyền "Edit Cloudflare Workers".
# (Account ID không phải bí mật nên để thẳng trong env bên dưới.)
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        env:
          CLOUDFLARE_ACCOUNT_ID: "4916931057954a4b6187316d83b4a5f2"
